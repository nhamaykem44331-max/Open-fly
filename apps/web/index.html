<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#A14B2C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="OpenFly" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="OpenFly — đặt vé máy bay thông minh cho người Việt. Săn vé rẻ tự động với trợ lý Sol. Bay trong nắng mới." />
    <title>OpenFly · Bay trong nắng mới</title>
    <!-- No-flash theme: apply the stored/system theme before first paint.
         Reads the same "openfly-theme" key the Zustand store writes. -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem("openfly-theme") || "system";
          var dark = m === "dark" || (m === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
